  <text x="1062" y="248" fill="#7F90B4" font-family="Segoe UI, Arial, sans-serif" font-size="14">Retrieval and system visibility</text>

  <rect x="1062" y="286" width="214" height="108" rx="16" fill="#131C31" stroke="#222D47"/>
  <text x="1082" y="318" fill="#7F90B4" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">TOP SOURCES</text>
  <text x="1082" y="346" fill="#F6F8FF" font-family="Segoe UI, Arial, sans-serif" font-size="14">README.md</text>
  <text x="1224" y="346" fill="#5CD6A8" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">0.92</text>
  <text x="1082" y="370" fill="#F6F8FF" font-family="Segoe UI, Arial, sans-serif" font-size="14">pipeline.py</text>
  <text x="1224" y="370" fill="#5CD6A8" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">0.87</text>

  <rect x="1062" y="414" width="214" height="126" rx="16" fill="#131C31" stroke="#222D47"/>
  <text x="1082" y="446" fill="#7F90B4" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">ARCHITECTURE</text>
  <text x="1082" y="474" fill="#D5DBEA" font-family="Segoe UI, Arial, sans-serif" font-size="13">Ingest</text>
  <text x="1150" y="474" fill="#D5DBEA" font-family="Segoe UI, Arial, sans-serif" font-size="13">Chunk</text>
  <text x="1212" y="474" fill="#D5DBEA" font-family="Segoe UI, Arial, sans-serif" font-size="13">Embed</text>
  <line x1="1090" y1="490" x2="1248" y2="490" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <text x="1082" y="524" fill="#D5DBEA" font-family="Segoe UI, Arial, sans-serif" font-size="13">Retrieve</text>
  <text x="1168" y="524" fill="#D5DBEA" font-family="Segoe UI, Arial, sans-serif" font-size="13">Answer</text>
  <text x="1236" y="524" fill="#D5DBEA" font-family="Segoe UI, Arial, sans-serif" font-size="13">Store</text>

  <rect x="1062" y="560" width="214" height="160" rx="16" fill="#131C31" stroke="#222D47"/>
  <text x="1082" y="592" fill="#7F90B4" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">STACK</text>
  <text x="1082" y="620" fill="#F6F8FF" font-family="Segoe UI, Arial, sans-serif" font-size="14">FastAPI · React · SQLite</text>
  <text x="1082" y="646" fill="#F6F8FF" font-family="Segoe UI, Arial, sans-serif" font-size="14">ChromaDB · sentence-transformers</text>
  <text x="1082" y="672" fill="#F6F8FF" font-family="Segoe UI, Arial, sans-serif" font-size="14">Groq · Gemini · Ollama</text>
  <text x="1082" y="698" fill="#F6F8FF" font-family="Segoe UI, Arial, sans-serif" font-size="14">Hybrid retrieval + citations</text>

  <text x="116" y="854" fill="#7F90B4" font-family="Segoe UI, Arial, sans-serif" font-size="14">README interface preview for VERO</text>
