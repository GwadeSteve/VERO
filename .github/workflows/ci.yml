name: VERO CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU-only PyTorch (skip 3GB CUDA download)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        working-directory: backend
        run: pip install -e .

      - name: Start server and wait for ready
        working-directory: backend
        env:
          TF_ENABLE_ONEDNN_OPTS: "0"
          TF_CPP_MIN_LOG_LEVEL: "2"
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 2
          done
          curl --fail http://127.0.0.1:8000/health || exit 1

      - name: Run Layer 1 tests
        working-directory: backend
        run: python tests/test_layer1.py

      - name: Run Layer 2 tests
        working-directory: backend
        run: python tests/test_layer2.py

      - name: Run Layer 3 tests
        working-directory: backend
        env:
          TF_ENABLE_ONEDNN_OPTS: "0"
        run: python tests/test_layer3.py

      - name: Run Layer 4 tests
        working-directory: backend
        env:
          TF_ENABLE_ONEDNN_OPTS: "0"
        run: python tests/test_layer4.py
